<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Katkout AI Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* إضافة لمسة احترافية للأندرويد */
        body { -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans min-h-screen">

    <div class="p-5">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-2xl font-black bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                KATKOUT AI
            </h1>
            <span class="text-xs bg-blue-500/20 text-blue-400 px-2 py-1 rounded-full border border-blue-500/30">V1.0.0</span>
        </div>

        <div class="space-y-4">
            <div class="glass border border-slate-700 p-4 rounded-2xl">
                <label class="block text-sm font-medium mb-2 text-slate-400">وصف الصورة (Prompt)</label>
                <textarea id="promptInput" 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all h-32"
                    placeholder="مثلاً: رائد فضاء يركب خيلاً في المريخ بأسلوب السينما..."></textarea>
            </div>

            <button onclick="generateAction()" id="btnText"
                class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-500/20 active:scale-95 transition-all">
                توليد الصورة الآن
            </button>
        </div>

        <div id="resultContainer" class="mt-8 hidden">
            <div class="glass border border-slate-700 p-2 rounded-2xl overflow-hidden">
                <img id="generatedImage" src="" alt="AI Result" class="w-full h-auto rounded-xl">
            </div>
            <p class="text-center text-xs text-slate-500 mt-4 italic">تم التوليد بواسطة ذكاء اصطناعي مستند إلى سحابة</p>
        </div>
    </div>

    <script>
        function generateAction() {
            const prompt = document.getElementById('promptInput').value;
            const btn = document.getElementById('btnText');
            const resultContainer = document.getElementById('resultContainer');
            const img = document.getElementById('generatedImage');

            if (!prompt) {
                alert("عفاك اكتب شي حاجة أولاً!");
                return;
            }

            // تغيير حالة الزر (Loading)
            btn.disabled = true;
            btn.innerText = "جاري الطبخ... ⏳";
            btn.classList.add('opacity-70');

            // رابط الـ API (استعملنا Pollinations كمحرك مجاني وسريع)
            const seed = Math.floor(Math.random() * 1000000);
            const imageUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&model=flux`;

            // تحميل الصورة
            const tempImg = new Image();
            tempImg.src = imageUrl;
            tempImg.onload = () => {
                img.src = imageUrl;
                resultContainer.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "توليد الصورة الآن";
                btn.classList.remove('opacity-70');
                
                // Scroll لنتيجة
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };
        }
    </script>
</body>
</html>
