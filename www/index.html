<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Katkout AI Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
    </script>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen font-sans">

    <div class="p-6 max-w-md mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-blue-500 tracking-tight">KATKOUT AI</h1>
            <p class="text-slate-400 text-sm mt-1">حول أفكارك لصور بضغطة زر</p>
        </div>

        <div class="space-y-4">
            <div class="glass border border-slate-700 p-4 rounded-2xl shadow-2xl">
                <label class="block text-xs font-bold text-blue-400 mb-2 uppercase tracking-wider">وصف الصورة</label>
                <textarea id="promptInput" 
                    class="w-full bg-slate-900/80 border border-slate-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all h-32 resize-none"
                    placeholder="مثلاً: مدينة مغربية مستقبلية في كوكب المريخ..."></textarea>
            </div>

            <button onclick="generateImage()" id="mainBtn"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-900/20 active:scale-95 transition-all flex items-center justify-center gap-2">
                <span id="btnText">توليد الصورة الآن</span>
            </button>
        </div>

        <div id="resultArea" class="mt-8 hidden">
            <div class="relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-emerald-500 rounded-2xl blur opacity-25"></div>
                <div class="relative glass border border-slate-700 p-2 rounded-2xl">
                    <img id="outputImage" src="" alt="AI Result" class="w-full h-auto rounded-xl">
                </div>
            </div>
            <p class="text-center text-xs text-slate-500 mt-4">تم التوليد بنجاح ✅</p>
        </div>
    </div>

    <script>
        function generateImage() {
            const prompt = document.getElementById('promptInput').value;
            const btn = document.getElementById('mainBtn');
            const btnText = document.getElementById('btnText');
            const resultArea = document.getElementById('resultArea');
            const img = document.getElementById('outputImage');

            if (!prompt) {
                alert("أكتب وصف الصورة أولاً أ خاي!");
                return;
            }

            // Loading State
            btn.disabled = true;
            btnText.innerText = "جاري التوليد... ⏳";
            btn.classList.add('opacity-70', 'cursor-not-allowed');

            // API Call
            const seed = Math.floor(Math.random() * 999999);
            const url = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&nologo=true`;

            // Load Image
            const tempImg = new Image();
            tempImg.src = url;
            tempImg.onload = () => {
                img.src = url;
                resultArea.classList.remove('hidden');
                btn.disabled = false;
                btnText.innerText = "توليد الصورة الآن";
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                
                // Scroll to image
                resultArea.scrollIntoView({ behavior: 'smooth' });
            };
        }
    </script>
</body>
</html>
